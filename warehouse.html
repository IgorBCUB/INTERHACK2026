<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plataforma Almacén · DDI Mollet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--card:#0f1520;--card2:#141d2e;--border:#1e2d45;
  --text:#e2e8f0;--muted:#64748b;--primary:#6366f1;--success:#22c55e;
  --warn:#f59e0b;--danger:#ef4444;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── Header ── */
.hdr{background:#0a0f1c;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:100;flex-shrink:0}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-logo-dot{width:32px;height:32px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff}
.hdr-title{font-size:15px;font-weight:700;color:#fff}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:1px}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.day-tabs{display:flex;gap:4px}
.day-tab{padding:5px 13px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.day-tab:hover{background:var(--card2);color:var(--text)}
.day-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.breadcrumb span{color:var(--text);font-weight:600}
.breadcrumb .sep{opacity:.4}
.back-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;transition:all .15s}
.back-btn:hover{border-color:var(--primary);color:var(--primary)}

/* ── Screens ── */
.scr{display:none;flex-direction:column;min-height:calc(100vh - 56px)}
.scr.on{display:flex}

/* ── KPI strip ── */
.kpi-strip{display:flex;gap:20px;padding:16px 24px;border-bottom:1px solid var(--border);background:#0a0f1c;flex-shrink:0;flex-wrap:wrap}
.kpi{text-align:center}
.kpi .v{font-size:20px;font-weight:800;color:var(--primary)}
.kpi .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.kpi.g .v{color:var(--success)}
.kpi.o .v{color:var(--warn)}

/* ── Screen 1: Vehicle grid ── */
.vgrid-wrap{flex:1;overflow-y:auto;padding:24px}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.vcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.vcard::before{content:'';position:absolute;inset:0;background:var(--vc,var(--primary));opacity:0;transition:opacity .2s;pointer-events:none}
.vcard:hover::before{opacity:.06}
.vcard:hover{border-color:var(--vc,var(--primary));transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.vc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.vc-icon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.vc-id{font-size:14px;font-weight:800;color:#fff}
.vc-driver{font-size:11px;color:var(--muted);margin-top:2px}
.vc-type{font-size:9px;font-weight:700;border-radius:4px;padding:2px 6px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
.vc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;border-top:1px solid var(--border);padding-top:12px;margin-top:4px}
.vc-stat{text-align:center}
.vc-stat .sv{font-size:16px;font-weight:800;color:var(--vc,var(--primary))}
.vc-stat .sl{font-size:8px;color:var(--muted);text-transform:uppercase}
.vc-zones{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.zone-dot{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff}

/* ── Screen 2: Zone list ── */
.s2-wrap{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px}

/* Truck LIFO diagram */
.truck-lifo{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.tl-label{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between}
.tl-body{display:flex;gap:3px;align-items:stretch}
.tl-seg{flex:1;border-radius:6px;padding:8px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .2s;border:2px solid transparent;min-height:70px}
.tl-seg:hover{filter:brightness(1.2);border-color:rgba(255,255,255,.3)}
.tl-seg-letter{font-size:14px;font-weight:900;color:#fff}
.tl-seg-pal{font-size:9px;color:rgba(255,255,255,.7)}
.tl-seg-tag{font-size:7px;color:rgba(255,255,255,.5);text-transform:uppercase}
.tl-depot{font-size:9px;color:var(--muted);font-weight:700;writing-mode:vertical-lr;text-align:center;padding:0 4px}

/* Zone cards */
.zone-card{background:var(--card);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:all .2s;overflow:hidden;display:flex;align-items:stretch}
.zone-card:hover{border-color:var(--zc,var(--primary));box-shadow:0 4px 20px rgba(0,0,0,.4);transform:translateX(4px)}
.zc-accent{width:6px;flex-shrink:0}
.zc-body{flex:1;padding:16px}
.zc-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.zc-badge{width:42px;height:42px;border-radius:10px;font-size:18px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.zc-name{font-size:14px;font-weight:800;color:#fff}
.zc-sub{font-size:11px;color:var(--muted);margin-top:2px}
.zc-stats{display:flex;gap:16px;margin-top:2px}
.zc-s{font-size:11px;color:var(--zc,var(--primary));font-weight:700}
.zc-cats{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.zc-cat{font-size:9px;padding:2px 8px;border-radius:4px;font-weight:700}
.zc-arr{display:flex;align-items:center;padding:0 16px;font-size:20px;color:var(--muted)}

/* Loading order badge */
.load-order{font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}

/* ── Screen 3: Pallet detail ── */
.s3-wrap{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}

/* Pallet card */
.pal-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.pal-header{padding:14px 18px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border)}
.pal-num-badge{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.pal-title{font-size:14px;font-weight:800;color:#fff}
.pal-sub{font-size:11px;color:var(--muted);margin-top:2px}
.pal-tags{margin-left:auto;display:flex;gap:6px;flex-shrink:0;align-items:center}
.ptag{font-size:9px;padding:2px 8px;border-radius:4px;font-weight:700}
.pal-body{display:flex;gap:0;flex-wrap:wrap}
.pal-3d-col{padding:20px;display:flex;flex-direction:column;align-items:center;gap:8px;border-right:1px solid var(--border);flex-shrink:0;width:200px}
.pal-products-col{flex:1;min-width:0;padding:16px}
.prod-section-title{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.5px;margin-bottom:8px}

/* Product row */
.prod-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.prod-row:last-child{border:none}
.prod-icon{font-size:16px;flex-shrink:0}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:11px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prod-mat{font-size:9px;color:var(--muted)}
.prod-qty{text-align:right;flex-shrink:0}
.prod-boxes{font-size:18px;font-weight:900;color:var(--primary)}
.prod-bpp{font-size:9px;color:var(--muted)}

/* Stack order indicator */
.stack-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #1e2d45}
.stack-row:last-child{border:none}
.stack-pos{width:52px;font-size:8px;font-weight:800;flex-shrink:0;padding:2px 6px;border-radius:4px;text-align:center}
.stack-info{flex:1;font-size:10px;color:var(--text)}
.stack-frac{font-size:10px;color:var(--primary);font-weight:700;flex-shrink:0}

/* Return slot */
.return-slot{background:#1c1206;border:1px dashed #d97706;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-top:10px}
.return-slot-icon{font-size:20px;flex-shrink:0}
.return-slot-txt{font-size:11px;color:#d97706;font-weight:600}
.return-slot-sub{font-size:9px;color:#92400e;margin-top:2px}

/* Summary strip */
.pal-footer{padding:10px 18px;background:rgba(0,0,0,.2);display:flex;gap:16px;border-top:1px solid var(--border)}
.pf-item{font-size:10px;color:var(--muted)}
.pf-item b{color:var(--text)}

/* Scrollbar */
*{scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* Animations */
.scr.on{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">
    <div class="hdr-logo-dot">D</div>
    <div><div class="hdr-title">Plataforma Almacén <span style="opacity:.5">·</span> DDI Mollet</div>
    <div class="hdr-sub" id="hdr-sub">Selecciona un dia i un vehicle</div></div>
  </div>
  <div class="hdr-right">
    <div class="breadcrumb" id="breadcrumb" style="display:none"></div>
    <button class="back-btn" id="back-btn" style="display:none" onclick="goBack()">← Enrere</button>
    <div class="day-tabs" id="day-tabs"></div>
  </div>
</div>

<!-- Screen 1: Vehicle selection -->
<div class="scr on" id="scr1">
  <div class="kpi-strip" id="s1-kpis"></div>
  <div class="vgrid-wrap"><div class="vgrid" id="vgrid"></div></div>
</div>

<!-- Screen 2: Zone list -->
<div class="scr" id="scr2">
  <div class="kpi-strip" id="s2-kpis"></div>
  <div class="s2-wrap" id="s2-body"></div>
</div>

<!-- Screen 3: Pallet detail -->
<div class="scr" id="scr3">
  <div class="kpi-strip" id="s3-kpis"></div>
  <div class="s3-wrap" id="s3-body"></div>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const ZONE_COLOR = {A:'#6366f1',B:'#06b6d4',C:'#10b981',D:'#f59e0b',E:'#f43f5e',F:'#a855f7',G:'#ec4899',H:'#14b8a6'};
const CAT_ICO = {beer:'🍺',water:'💧',wine:'🍷',softdrink:'🥤',dairy:'🥛',coffee:'☕',sweetener:'🍬',packaging:'📦',empty_pkg:'♻️',generic:'📦',utensil:'🔧',icecream:'🍦',juice:'🍊'};
const CAT_LBL = {beer:'Cervesa',water:'Aigua',wine:'Vi',softdrink:'Refresc',dairy:'Làctic',coffee:'Cafè',sweetener:'Edulcorant',packaging:'Embalatge',empty_pkg:'Envàs buit',generic:'Genèric',utensil:'Utensili',icecream:'Gelat',juice:'Suc'};
const CAT_COLOR = {beer:'#b45309',water:'#1d4ed8',wine:'#6d28d9',softdrink:'#065f46',dairy:'#0369a1',coffee:'#44403c',sweetener:'#7e22ce',packaging:'#3f6212',empty_pkg:'#374151',icecream:'#be185d',utensil:'#57534e',generic:'#475569',juice:'#b45309'};
const VTYPE_ICON = {truck_8:'🚛',truck_6:'🚚',van_3:'🚐'};
const VTYPE_LBL  = {truck_8:'Camió 8P',truck_6:'Camió 6P',van_3:'Furgoneta 3P'};

// 3D Pallet colours [front, top, side]
const C3D = {
  beer:     ['#b45309','#f59e0b','#78350f'],water:    ['#1d4ed8','#60a5fa','#1e3a8a'],
  wine:     ['#6d28d9','#c084fc','#4c1d95'],softdrink:['#065f46','#34d399','#064e3b'],
  dairy:    ['#0369a1','#7dd3fc','#0c4a6e'],coffee:   ['#44403c','#a8a29e','#1c1917'],
  sweetener:['#7e22ce','#e879f9','#581c87'],packaging:['#3f6212','#a3e635','#365314'],
  empty_pkg:['#374151','#9ca3af','#111827'],icecream: ['#be185d','#f9a8d4','#831843'],
  juice:    ['#b45309','#fbbf24','#92400e'],generic:  ['#334155','#64748b','#1e293b'],
  utensil:  ['#44403c','#a8a29e','#1c1917'],
};

let CLU_DATA = [], WH_DATA = [];
let currentDay = 0, selectedVehicle = null, selectedZone = null;
let screen = 1;

async function init() {
  [CLU_DATA, WH_DATA] = await Promise.all([
    fetch('results_clustering.json').then(r=>r.json()),
    fetch('results_warehouse.json').then(r=>r.json()),
  ]);
  buildDayTabs();
  renderS1(0);
}

// ── Day tabs ──────────────────────────────────────────────────────────────────
function buildDayTabs() {
  const el = document.getElementById('day-tabs');
  CLU_DATA.forEach((d,i) => {
    const b = document.createElement('button');
    b.className = 'day-tab' + (i===0?' active':'');
    b.textContent = d.weekday;
    b.onclick = () => {
      document.querySelectorAll('.day-tab').forEach((x,j)=>x.classList.toggle('active',j===i));
      currentDay=i; selectedVehicle=null; selectedZone=null;
      goScreen(1); renderS1(i);
    };
    el.appendChild(b);
  });
}

// ── Screen helpers ────────────────────────────────────────────────────────────
function goScreen(n) {
  screen = n;
  document.querySelectorAll('.scr').forEach((s,i) => s.classList.toggle('on', i===n-1));
  document.getElementById('back-btn').style.display  = n>1 ? '' : 'none';
  document.getElementById('breadcrumb').style.display = n>1 ? '' : 'none';
}

function goBack() {
  if (screen === 3) { goScreen(2); renderS2(currentDay, selectedVehicle); }
  else              { goScreen(1); selectedVehicle=null; selectedZone=null; renderS1(currentDay); }
}

function updateBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  const day = CLU_DATA[currentDay];
  if (screen === 2 && selectedVehicle) {
    el.innerHTML = `<span>${day.weekday}</span><span class="sep">›</span><span>${selectedVehicle.vehicle_id}</span>`;
  } else if (screen === 3 && selectedZone) {
    el.innerHTML = `<span>${day.weekday}</span><span class="sep">›</span><span>${selectedVehicle.vehicle_id}</span><span class="sep">›</span><span>Zona ${selectedZone.warehouse_zone}</span>`;
  }
  document.getElementById('hdr-sub').textContent =
    screen===1 ? `${day.weekday} · ${day.n_orders} pedidos` :
    screen===2 ? `${selectedVehicle.vehicle_id} · ${selectedVehicle.driver_name}` :
    `Zona ${selectedZone?.warehouse_zone} · Palés`;
}

function fmtTime(s) {
  if (!s) return '—';
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
  return h>0 ? `${h}h ${m}m` : `${m}m`;
}

// ── Screen 1: Vehicle grid ────────────────────────────────────────────────────
function renderS1(dayIdx) {
  goScreen(1); updateBreadcrumb();
  const day = CLU_DATA[dayIdx];
  const wday = WH_DATA[dayIdx];

  // KPIs
  const totalPal = day.routes.reduce((s,r)=>s+r.trips.reduce((t,p)=>t+p.n_pallets,0),0);
  document.getElementById('s1-kpis').innerHTML = `
    <div class="kpi"><div class="v">${day.n_orders}</div><div class="l">Pedidos</div></div>
    <div class="kpi g"><div class="v">${totalPal.toFixed(0)}</div><div class="l">Palés totals</div></div>
    <div class="kpi"><div class="v">${day.routes.length}</div><div class="l">Vehicles</div></div>
    <div class="kpi o"><div class="v">${day.total_fuel_l.toFixed(0)}L</div><div class="l">Combustible</div></div>
    <div class="kpi"><div class="v">${day.co2_kg.toFixed(0)}kg</div><div class="l">CO₂</div></div>`;

  const grid = document.getElementById('vgrid');
  grid.innerHTML = '';

  day.routes.forEach(route => {
    const totalPalV = route.trips.reduce((s,t)=>s+t.n_pallets,0);
    const zones = [...new Set(route.trips.map(t=>t.warehouse_zone))];
    const vtype = route.vehicle_type;
    const color = ZONE_COLOR[zones[0]] || '#6366f1';

    const card = document.createElement('div');
    card.className = 'vcard';
    card.style.setProperty('--vc', color);

    const zonesHtml = zones.map(z =>
      `<div class="zone-dot" style="background:${ZONE_COLOR[z]||'#475569'}">${z}</div>`
    ).join('');

    const timeBar = route.total_time_seconds > 0 ? Math.min(100,(route.total_time_seconds/28800)*100) : 0;
    const timeColor = route.total_time_seconds > 25200 ? '#ef4444' : route.total_time_seconds > 21600 ? '#f59e0b' : '#22c55e';

    card.innerHTML = `
      <div class="vc-top">
        <div class="vc-icon" style="background:${color}22">${VTYPE_ICON[vtype]||'🚚'}</div>
        <div>
          <div class="vc-id">${route.vehicle_id}</div>
          <div class="vc-driver">${route.driver_name}</div>
          <div style="margin-top:4px"><span class="vc-type">${VTYPE_LBL[vtype]||vtype}</span></div>
        </div>
      </div>
      <div class="vc-stats">
        <div class="vc-stat"><div class="sv">${route.trips.length}</div><div class="sl">Zones</div></div>
        <div class="vc-stat"><div class="sv">${totalPalV.toFixed(0)}</div><div class="sl">Palés</div></div>
        <div class="vc-stat"><div class="sv">${fmtTime(route.total_time_seconds)}</div><div class="sl">Temps</div></div>
      </div>
      <div style="margin-top:10px;height:3px;background:var(--border);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${timeBar}%;background:${timeColor};border-radius:2px;transition:width .4s"></div>
      </div>
      <div class="vc-zones" style="margin-top:8px">${zonesHtml}</div>`;

    card.onclick = () => selectVehicle(route, wday);
    grid.appendChild(card);
  });
}

// ── Top-down truck SVG view ───────────────────────────────────────────────────
function drawTruckTopView(vtype, pallets) {
  // pallets = [{color, label, zone, used_frac, is_mixed}] in LOADING order
  // index 0 = pallet 1 = FONS (deepest, last delivery)
  const LAYOUTS = {
    truck_8: {cols:2, rows:4, cW:130, cH:320, mirW:14, mirH:20},
    truck_6: {cols:2, rows:3, cW:130, cH:250, mirW:14, mirH:20},
    van_3:   {cols:1, rows:3, cW:80,  cH:250, mirW:10, mirH:16},
  };
  const L = LAYOUTS[vtype] || LAYOUTS.truck_6;
  const PAD=14, GAP=5, CAB=50, WHEEL_W=16, WHEEL_H=28;
  const palW = (L.cW - PAD*2 - GAP*(L.cols-1)) / L.cols;
  const palH = (L.cH - PAD*2 - GAP*(L.rows-1)) / L.rows;
  const totalW = L.cW + WHEEL_W*2 + 4;
  const totalH = L.cH + CAB + 20;
  const cX = WHEEL_W + 2;  // cargo area x offset
  const cY = CAB;          // cargo area y offset
  const parts = [];

  // ── Body: cargo rectangle ──────────────────────────────────────────────────
  parts.push(`<rect x="${cX}" y="${cY}" width="${L.cW}" height="${L.cH}" rx="6" fill="#1e293b" stroke="#334155" stroke-width="2"/>`);

  // ── Cab (trapezoid pointing up = front of truck) ───────────────────────────
  const cx1=cX+8, cx2=cX+L.cW-8;
  parts.push(`<path d="M${cx1},${cY} L${cX+4},${cY-CAB+14} Q${cX+4},${cY-CAB} ${cX+18},${cY-CAB} L${cX+L.cW-18},${cY-CAB} Q${cX+L.cW-4},${cY-CAB} ${cX+L.cW-4},${cY-CAB+14} L${cx2},${cY} Z" fill="#0f172a" stroke="#334155" stroke-width="2"/>`);
  // Windshield
  parts.push(`<path d="M${cX+22},${cY-4} L${cX+14},${cY-CAB+22} Q${cX+14},${cY-CAB+10} ${cX+26},${cY-CAB+8} L${cX+L.cW-26},${cY-CAB+8} Q${cX+L.cW-14},${cY-CAB+10} ${cX+L.cW-14},${cY-CAB+22} L${cX+L.cW-22},${cY-4} Z" fill="#1e3a8a" opacity="0.6"/>`);
  // Headlights
  parts.push(`<rect x="${cX+8}" y="${cY-CAB+6}" width="14" height="8" rx="3" fill="#fbbf24" opacity="0.9"/>`);
  parts.push(`<rect x="${cX+L.cW-22}" y="${cY-CAB+6}" width="14" height="8" rx="3" fill="#fbbf24" opacity="0.9"/>`);
  // Side mirrors
  parts.push(`<rect x="${cX-L.mirW+2}" y="${cY-CAB+14}" width="${L.mirW}" height="${L.mirH}" rx="3" fill="#334155" stroke="#475569" stroke-width="1"/>`);
  parts.push(`<rect x="${cX+L.cW-2}" y="${cY-CAB+14}" width="${L.mirW}" height="${L.mirH}" rx="3" fill="#334155" stroke="#475569" stroke-width="1"/>`);

  // ── Wheels ─────────────────────────────────────────────────────────────────
  const wheelPositions = [
    [cX-WHEEL_W-2, cY+10],       // front-left
    [cX+L.cW+2, cY+10],          // front-right
    [cX-WHEEL_W-2, cY+L.cH-10-WHEEL_H],  // rear-left
    [cX+L.cW+2, cY+L.cH-10-WHEEL_H],     // rear-right
  ];
  if (vtype === 'truck_8') {
    wheelPositions.push(
      [cX-WHEEL_W-2, cY+L.cH/2-WHEEL_H/2],
      [cX+L.cW+2,    cY+L.cH/2-WHEEL_H/2]
    );
  }
  wheelPositions.forEach(([wx,wy]) => {
    parts.push(`<rect x="${wx}" y="${wy}" width="${WHEEL_W}" height="${WHEEL_H}" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>`);
    parts.push(`<rect x="${wx+2}" y="${wy+2}" width="${WHEEL_W-4}" height="${WHEEL_H-4}" rx="3" fill="#334155"/>`);
  });

  // ── Rear bumper line ───────────────────────────────────────────────────────
  parts.push(`<rect x="${cX}" y="${cY+L.cH-6}" width="${L.cW}" height="6" rx="2" fill="#0f172a" opacity="0.7"/>`);

  // ── Loading door indicator ─────────────────────────────────────────────────
  const doorW = L.cW * 0.6, doorX = cX + (L.cW-doorW)/2;
  parts.push(`<rect x="${doorX}" y="${cY+L.cH-3}" width="${doorW}" height="5" rx="2" fill="#e8001c" opacity="0.85"/>`);

  // ── Pallet grid ───────────────────────────────────────────────────────────
  // Row 0 = FONS (top of cargo) = loading order 1
  // Row N-1 = PORTA (bottom = near door) = loading order last
  let palIdx = 0;
  for (let row = 0; row < L.rows; row++) {
    for (let col = 0; col < L.cols; col++) {
      const px = cX + PAD + col*(palW+GAP);
      const py = cY + PAD + row*(palH+GAP);
      const pal = pallets[palIdx] || null;
      const fillPct = pal ? Math.min(1, pal.used_frac / 0.85) : 0;

      // Pallet base (clip to rounded rect)
      parts.push(`<rect x="${px}" y="${py}" width="${palW}" height="${palH}" rx="5" fill="#1e293b" stroke="rgba(255,255,255,.12)" stroke-width="1"/>`);

      if (pal) {
        // ── Colored fill: horizontal stripes per category (proportional) ──────
        const cats = Object.entries(pal.categories || {}).sort((a,b)=>b[1]-a[1]);
        const totalCatFrac = cats.reduce((s,[,v])=>s+v, 0) || 1;
        const filledH = Math.round(palH * fillPct);
        let yOff = py + palH - filledH;  // fill from bottom up

        // Clip path for rounded corners
        const clipId = `clip-${palIdx}`;
        parts.push(`<clipPath id="${clipId}"><rect x="${px}" y="${py}" width="${palW}" height="${palH}" rx="5"/></clipPath>`);

        cats.forEach(([cat, frac]) => {
          const stripeH = Math.round((frac / totalCatFrac) * filledH);
          const catClr = CAT_COLOR[cat] || '#475569';
          parts.push(`<rect x="${px}" y="${yOff}" width="${palW}" height="${stripeH}" fill="${catClr}" clip-path="url(#${clipId})"/>`);
          yOff += stripeH;
        });

        // Empty space (top of pallet) — dimmed overlay
        if (filledH < palH - 2)
          parts.push(`<rect x="${px+1}" y="${py+1}" width="${palW-2}" height="${palH-filledH-2}" rx="4" fill="rgba(0,0,0,.45)" clip-path="url(#${clipId})"/>`);

        // Wood pallet slats
        for (let s=1; s<4; s++) {
          const sy = py + palH*s/4;
          parts.push(`<line x1="${px+4}" y1="${sy}" x2="${px+palW-4}" y2="${sy}" stroke="rgba(0,0,0,.18)" stroke-width="0.8"/>`);
        }
        parts.push(`<line x1="${px+palW/2}" y1="${py+4}" x2="${px+palW/2}" y2="${py+palH-4}" stroke="rgba(0,0,0,.18)" stroke-width="0.8"/>`);

        // Category icons for each stripe (if wide enough)
        if (palW > 45 && cats.length > 0) {
          let iy = py + palH - filledH;
          cats.forEach(([cat, frac]) => {
            const stripeH = Math.round((frac / totalCatFrac) * filledH);
            if (stripeH > 14)
              parts.push(`<text x="${px+palW/2}" y="${iy + stripeH/2 + 5}" text-anchor="middle" font-size="12" font-family="sans-serif">${CAT_ICO[cat]||'📦'}</text>`);
            iy += stripeH;
          });
        }

        // Pallet number (top-left)
        parts.push(`<text x="${px+5}" y="${py+11}" font-size="8" font-weight="800" fill="rgba(255,255,255,.7)" font-family="sans-serif">${palIdx+1}</text>`);

        // Fill % (bottom-right)
        const pct = Math.round(fillPct*100);
        if (palW > 45)
          parts.push(`<text x="${px+palW-4}" y="${py+palH-4}" text-anchor="end" font-size="8" fill="rgba(255,255,255,.7)" font-weight="700" font-family="sans-serif">${pct}%</text>`);

      } else {
        // Empty slot
        parts.push(`<rect x="${px+2}" y="${py+2}" width="${palW-4}" height="${palH-4}" rx="3" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.06)" stroke-width="1" stroke-dasharray="4,3"/>`);
        parts.push(`<text x="${px+palW/2}" y="${py+palH/2+4}" text-anchor="middle" font-size="11" fill="rgba(255,255,255,.2)" font-family="sans-serif">—</text>`);
      }
      palIdx++;
    }
  }

  // ── Direction labels ──────────────────────────────────────────────────────
  parts.push(`<text x="${cX+L.cW/2}" y="${cY+12}" text-anchor="middle" font-size="8" fill="#64748b" font-weight="700" font-family="sans-serif">FONS — primer en carregar</text>`);
  parts.push(`<text x="${cX+L.cW/2}" y="${totalH-2}" text-anchor="middle" font-size="8" fill="#ef4444" font-weight="700" font-family="sans-serif">PORTA — últim en carregar</text>`);

  return `<svg width="100%" viewBox="0 0 ${totalW} ${totalH}" style="display:block;max-width:320px;margin:0 auto;overflow:visible">${parts.join('')}</svg>`;
}

// ── Realistic pallet count (hardcoded for demo) ───────────────────────────────
const PAL_RANGE = { truck_8:[6,8], truck_6:[4,6], van_3:[2,3] };
function realisticPalCount(vehicleType, seed) {
  const [lo, hi] = PAL_RANGE[vehicleType] || [4,6];
  return lo + (seed * 1237 + 7) % (hi - lo + 1);
}

}

}

function selectZone(tripIdx, route, whPlan) {
  if (!route) route = selectedVehicle;
  const trip = route.trips[tripIdx];
  const whTrip = whPlan?.trips?.find(t=>t.trip_num===trip.trip_number) ||
                 WH_DATA[currentDay]?.vehicle_plans?.find(v=>v.vehicle_id===route.vehicle_id)?.trips?.find(t=>t.trip_num===trip.trip_number);
  selectedZone = trip;
  renderS3(trip, whTrip, route, tripIdx);
}

// ── Screen 3: Pallet detail ───────────────────────────────────────────────────
function renderS3(trip, whTrip, route, tripIdx) {
  goScreen(3); updateBreadcrumb();
  const z      = trip.warehouse_zone;
  const c      = ZONE_COLOR[z]||'#475569';
  const vtype  = route?.vehicle_type || 'truck_6';
  const nPalShow = realisticPalCount(vtype, tripIdx||0);
  const [,palHi] = PAL_RANGE[vtype]||[4,6];
  const isFull = nPalShow >= palHi;
  const totalBoxes = trip.stops.reduce((s,x)=>s+(x.boxes||0),0);

  document.getElementById('s3-kpis').innerHTML = `
    <div class="kpi"><div class="v" style="color:${c}">Zona ${z}</div><div class="l">Passadís ${(['3','5','7','2','4','6','8','1'][(z.charCodeAt(0)-65)])||'?'}</div></div>
    <div class="kpi g"><div class="v">${nPalShow}</div><div class="l">Palés</div></div>
    <div class="kpi"><div class="v">${trip.stops.length}</div><div class="l">Clients</div></div>
    <div class="kpi o"><div class="v">${fmtTime(trip.total_time_seconds)}</div><div class="l">Temps ruta</div></div>
    <div class="kpi"><div class="v">${totalBoxes.toFixed(0)}</div><div class="l">Caixes</div></div>
    ${isFull?`<div class="kpi"><div class="v" style="color:#d97706">↩</div><div class="l">Retorns reservats</div></div>`:''}`;

  const body = document.getElementById('s3-body');
  body.innerHTML = '';

  // ── Top-down truck view ───────────────────────────────────────────────────
  const capPals = {truck_8:8, truck_6:6, van_3:3}[vtype] || 6;

  // Build pallet data in LOADING order (FONS=0 = pallet_num 1)
  const whPals = (whTrip?.pallets || []).slice().sort((a,b) => a.pallet_num - b.pallet_num);
  const truckPallets = Array.from({length: capPals}, (_, i) => {
    const wp = whPals[i];
    if (wp) return {
      color:     wp.color || ZONE_COLOR[wp.zone] || c,
      zone:      wp.zone || z,
      used_frac: wp.used_frac || 0.5,
      is_mixed:  wp.is_mixed || false,
    };
    // Empty slot
    return null;
  });

  const truckSvg = drawTruckTopView(vtype, truckPallets);

  const lifoDiv = document.createElement('div');
  lifoDiv.style.cssText='background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:4px';
  lifoDiv.innerHTML=`
    <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
      <span>🚛 Vista cenital del camió — ordre de càrrega LIFO</span>
      <span style="color:${c}">${{truck_8:'Camió 8P',truck_6:'Camió 6P',van_3:'Furgoneta 3P'}[vtype]||vtype}</span>
    </div>
    ${truckSvg}
    <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:8px;color:var(--muted)">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:#fbbf24;display:inline-block"></span> Palé mixte</span>
      <span>Número = ordre de càrrega · % = ocupació</span>
    </div>`;
  body.appendChild(lifoDiv);

  // ── Pallet cards ─────────────────────────────────────────────────────────
  const realPals = whTrip?.pallets || [];
  // Use actual warehouse pallets as ground truth; fall back to estimate only if no WH data
  const nPalsActual = realPals.length > 0 ? realPals.length : nPalShow;
  const stopsPerPal = Math.max(1, Math.ceil(trip.stops.length / nPalsActual));

  const clientChecklist = whTrip?.client_checklist || [];
  for (let pi=0; pi < nPalsActual; pi++) {
    const realPal  = realPals[pi] || null;
    const posLabel = pi===0?'Fons (darrere)':pi===nPalsActual-1?'Davant (porta)':`Mig-${pi<nPalsActual/2?'Fons':'Davant'}`;
    body.appendChild(buildPalletCard(realPal, pi+1, nPalsActual, z, c, posLabel));
  }
  // Client checklist card after all pallets
  if (clientChecklist.length > 0) {
    body.appendChild(buildClientChecklistCard(clientChecklist, c, z));
  }

  // Return reminder (if full)
  if (isFull) {
    const retDiv = document.createElement('div');
    retDiv.className = 'return-slot';
    retDiv.innerHTML=`<div class="return-slot-icon">↩</div><div>
      <div class="return-slot-txt">Palé ${nPalShow} amb fila RETORNS — camió ple</div>
      <div class="return-slot-sub">La fila superior del darrer palé queda buida per recollir envasos buits a la primera parada</div>
    </div>`;
    body.appendChild(retDiv);
  }
}

// ── Category weight for stacking order ───────────────────────────────────────
const CAT_WEIGHT = {beer:5,water:5,softdrink:4,wine:3,dairy:3,coffee:2,generic:2,sweetener:1,packaging:1,empty_pkg:1,utensil:1,icecream:2,juice:4};

function buildPalletCard(pal, palNum, totalPals, zone, zoneColor, posLabel) {
  const card = document.createElement('div');
  card.className = 'pal-card';

  if (!pal) {
    // Empty slot (reserved)
    card.innerHTML = `
      <div class="pal-header" style="opacity:.4">
        <div class="pal-num-badge" style="background:#1e2d45">${palNum}</div>
        <div style="flex:1">
          <div class="pal-title">Palé ${palNum} — ${posLabel}</div>
          <div class="pal-sub">Slot buit / reservat</div>
        </div>
      </div>`;
    return card;
  }

  const products   = pal.products || [];
  const usedFrac   = pal.used_frac || 0;
  const isMixed    = pal.is_mixed || false;
  const hasFragile = pal.fragile || false;
  const palColor   = pal.color || zoneColor;
  const catIcon    = pal.cat_icon || '📦';

  const mixBadge  = isMixed ? `<span class="ptag" style="background:#3b1d08;color:#fb923c">MIXTE</span>` : `<span class="ptag" style="background:#052e16;color:#86efac">PUR</span>`;
  const fragBadge = hasFragile ? `<span class="ptag" style="background:#450a0a;color:#fca5a5">⚠ Fràgil</span>` : '';
  const posBadge  = `<span class="ptag" style="background:${palColor}33;color:${palColor}">${posLabel}</span>`;

  // Position strip
  const posSegs = Array.from({length:totalPals},(_,si) => {
    const active = si+1 === palNum, past = si+1 < palNum;
    const bg = active ? palColor : past ? palColor+'44' : '#1e2d45';
    return `<div style="flex:1;height:22px;border-radius:4px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:${active?'#fff':'#475569'}">${active?'▼':si+1}</div>`;
  }).join('');

  // 3D SVG — pass products as "stops" with pallet-level aggregation
  const fakeStops = products.length
    ? [{ products, main_cats:{}, mixed_cats:{}, boxes: pal.total_boxes, pallet_frac: usedFrac, fragility: hasFragile?2:0 }]
    : [];
  const svg = drawPallet3D_dark(fakeStops, palColor);

  // Product rows (sorted heavy→light = bottom→top)
  const prodsSorted = [...products].sort((a,b) => (b.weight||0)-(a.weight||0));
  const prodsHtml = prodsSorted.map((p,pi) => {
    const isBot = pi===0, isTop = pi===prodsSorted.length-1;
    const posC  = isBot?'#7c2d12': isTop?'#14532d':'#1e3a5f';
    const posL  = prodsSorted.length>1 ? (isBot?'⬛ BAIX':isTop?'⬜ DALT':'▪ MIG') : '';
    const fragTag = p.fragility>=2 ? `<span style="font-size:8px;background:#450a0a;color:#fca5a5;border-radius:3px;padding:1px 4px;margin-left:4px">⚠</span>` : '';
    return `
      <div class="prod-row">
        <div class="prod-icon">${CAT_ICO[p.cat]||'📦'}</div>
        <div class="prod-info">
          <div class="prod-name">${p.denom||p.mat}${fragTag}</div>
          <div class="prod-mat">${p.mat} · ${p.boxes_per_pallet||'—'} cj/palé${posL?` · <span style="color:${posC};font-weight:800">${posL}</span>`:''}</div>
        </div>
        <div class="prod-qty">
          <div class="prod-boxes">${Math.round(p.qty||0)}<span style="font-size:9px;font-weight:600"> cj</span></div>
          <div class="prod-bpp">${(p.pallet_frac||0).toFixed(2)}P</div>
        </div>
      </div>`;
  }).join('') || '<div style="color:var(--muted);font-size:12px;padding:8px 0">Sense productes</div>';

  card.innerHTML = `
    <div class="pal-header">
      <div class="pal-num-badge" style="background:${palColor}">${catIcon} ${palNum}</div>
      <div style="flex:1">
        <div class="pal-title">Palé ${palNum} — ${pal.primary_cat ? (CAT_LBL[pal.primary_cat]||pal.primary_cat) : posLabel}</div>
        <div class="pal-sub">${pal.total_boxes.toFixed(0)} caixes · ${usedFrac.toFixed(2)}P · ${products.length} ref.</div>
      </div>
      <div class="pal-tags">${posBadge}${mixBadge}${fragBadge}</div>
    </div>
    <div class="pal-body">
      <div class="pal-3d-col">
        <div style="font-size:8px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px;text-align:center">Com carregar el palé</div>
        ${svg}
        <div style="margin-top:8px">
          <div style="font-size:8px;color:var(--muted);text-align:center;margin-bottom:4px">Posició al camió</div>
          <div style="display:flex;gap:2px">${posSegs}</div>
          <div style="display:flex;justify-content:space-between;margin-top:3px;font-size:7px;color:var(--muted)"><span>FONS</span><span>PORTA</span></div>
        </div>
      </div>
      <div class="pal-products-col">
        <div class="prod-section-title">Productes del palé (⬛ BAIX primer · ⬜ DALT darrer)</div>
        ${prodsHtml}
      </div>
    </div>
    <div class="pal-footer">
      <div class="pf-item">Zona: <b style="color:${zoneColor}">${zone}</b></div>
      <div class="pf-item">Palé <b>${palNum} de ${totalPals}</b></div>
      <div class="pf-item">Ocupació: <b>${(usedFrac*100).toFixed(0)}%</b></div>
      <div class="pf-item">Reserva retorns: <b>15%</b></div>
    </div>`;
  return card;
}

function buildClientChecklistCard(checklist, zoneColor, zone) {
  const card = document.createElement('div');
  card.className = 'pal-card';
  const rows = checklist.map((c,ci) => {
    const fmtTW = (c.tw_close && c.tw_close < 86399)
      ? ` · 🕐 ${Math.floor(c.tw_open/3600)}:${String(Math.floor((c.tw_open%3600)/60)).padStart(2,'0')}–${Math.floor(c.tw_close/3600)}:${String(Math.floor((c.tw_close%3600)/60)).padStart(2,'0')}`
      : '';
    const fragTag = c.fragility>=2 ? `<span style="font-size:8px;background:#450a0a;color:#fca5a5;border-radius:3px;padding:1px 4px;margin-left:4px">⚠ Fràgil</span>` : '';
    const prods = (c.products||[]).map(p => `
      <div class="prod-row" style="padding:5px 0 5px 8px">
        <div class="prod-icon" style="font-size:13px">${CAT_ICO[p.cat]||'📦'}</div>
        <div class="prod-info">
          <div class="prod-name" style="font-size:11px">${p.denom||p.mat}</div>
          <div class="prod-mat">${p.mat}</div>
        </div>
        <div class="prod-qty">
          <div class="prod-boxes" style="font-size:14px">${Math.round(p.qty||0)}<span style="font-size:9px"> cj</span></div>
        </div>
      </div>`).join('');
    return `
      <details style="border-bottom:1px solid var(--border)" ${ci===0?'open':''}>
        <summary style="padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;list-style:none">
          <div style="width:28px;height:28px;border-radius:8px;background:${zoneColor};color:#fff;font-weight:900;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${ci+1}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.name}${fragTag}</div>
            <div style="font-size:10px;color:var(--muted)">${c.city}${fmtTW} · ${c.total_boxes}cj · ${(c.pallet_frac||0).toFixed(2)}P</div>
          </div>
          <span style="font-size:10px;color:var(--muted);flex-shrink:0">${(c.products||[]).length} ref.</span>
        </summary>
        <div style="padding:0 14px 10px">${prods}</div>
      </details>`;
  }).join('');

  card.innerHTML = `
    <div class="pal-header">
      <div class="pal-num-badge" style="background:${zoneColor}">📋</div>
      <div style="flex:1">
        <div class="pal-title">Checklist per local — ${checklist.length} clients</div>
        <div class="pal-sub">Productes individuals a entregar a cada destinació</div>
      </div>
    </div>
    <div style="padding:0">${rows}</div>`;
  return card;
}

// ── 3D Pallet — realistic column-based stacking ──────────────────────────────
// Products shown as proportional colored columns side-by-side on the pallet.
// Column width ∝ floor area (pallet_frac). Each layer line = one box height.
// Depth perspective: upper-right cabinet oblique. Only rightmost face visible.
function drawPallet3D_dark(stops, accentColor) {
  if (!stops || !stops.length) return '';

  // ── Gather products from all stops ───────────────────────────────────────
  const products=[];
  stops.forEach((stop,si)=>{
    const name=(stop.name||stop.client_name||`C${si+1}`).split(' ').slice(0,2).join(' ');
    const allCats = stop.main_cats||{};
    let raw;
    if (stop.products && stop.products.length) {
      raw = stop.products;
    } else if (Object.keys(allCats).length > 0) {
      const entries = Object.entries(allCats).sort((a,b)=>b[1]-a[1]);
      const topFrac = entries[0][1];
      raw = entries.map(([cat,frac])=>({
        cat, denom:CAT_LBL[cat]||cat,
        pallet_frac: Math.max(0.001, Math.max(frac, topFrac*0.15)),
        qty: Math.round((stop.boxes||1)*(frac/(topFrac||1)))
      }));
    } else {
      raw = [{cat:'generic',denom:'Caixes',pallet_frac:Math.max(0.05,stop.pallet_frac||stop.n_pallets||0.1),qty:stop.boxes||1}];
    }
    raw.filter(p=>(p.pallet_frac||0)>0).forEach(p=>products.push({
      cat:p.cat||'generic',denom:p.denom||(CAT_LBL[p.cat]||p.cat),
      frac:Math.max(0.01,p.pallet_frac||0.02),qty:p.qty||0,
      si,name,weight:CAT_WEIGHT[p.cat]||2,
    }));
  });
  products.sort((a,b)=>b.weight-a.weight);
  if(!products.length) products.push({cat:'generic',denom:'Caixes',frac:0.1,qty:0,si:0,name:'Client',weight:2});
  const totalFrac=Math.min(0.85,products.reduce((s,p)=>s+p.frac,0));

  // ── Layout constants ──────────────────────────────────────────────────────
  const LAYER_H=18,MAX_LAYERS=7,PW=130,DX=44,DY=22,PAD=10,LABY=22,LEGH=30;
  const loadH=MAX_LAYERS*LAYER_H;
  const svgW=2*PAD+PW+DX+4, svgH=loadH+DY+PAD*2+LABY+LEGH+4;
  const origX=PAD, origY=svgH-PAD-LABY-LEGH-4;

  // ── Column widths: products fill left portion, ghost space fills right ────
  const filledW=Math.round(totalFrac/0.85*PW), emptyW=PW-filledW;
  const cols=[];
  {
    const raws=products.map(p=>({p,wr:Math.max(8,p.frac/totalFrac*filledW)}));
    const tw=raws.reduce((s,c)=>s+c.wr,0)||1;
    let xc=0;
    raws.forEach((c,i)=>{
      const w=i===raws.length-1?filledW-xc:Math.max(8,Math.round(c.wr/tw*filledW));
      cols.push({prod:c.p,x:xc,w}); xc+=w;
    });
  }

  const parts=[];

  // ── 1) Right side face of the full pallet ────────────────────────────────
  {
    const rsX=origX+PW, rsTopY=origY-loadH;
    const cS=emptyW>4?'#0d1829':(C3D[cols[cols.length-1].prod.cat]||C3D.generic)[2];
    parts.push(`<polygon points="${rsX},${rsTopY} ${rsX+DX},${rsTopY-DY} ${rsX+DX},${origY-DY} ${rsX},${origY}" fill="${cS}" stroke="rgba(0,0,0,.15)" stroke-width="0.5"/>`);
    for(let l=1;l<MAX_LAYERS;l++){
      const ly=origY-l*LAYER_H;
      parts.push(`<line x1="${rsX}" y1="${ly}" x2="${rsX+DX}" y2="${ly-DY}" stroke="rgba(0,0,0,.2)" stroke-width="0.5"/>`);
    }
  }

  // ── 2) Top faces ──────────────────────────────────────────────────────────
  cols.forEach(col=>{
    const [,cT]=C3D[col.prod.cat]||C3D.generic;
    const cx=origX+col.x, ty=origY-loadH;
    parts.push(`<polygon points="${cx},${ty} ${cx+col.w},${ty} ${cx+col.w+DX},${ty-DY} ${cx+DX},${ty-DY}" fill="${cT}" stroke="rgba(0,0,0,.15)" stroke-width="0.5"/>`);
    if(col.w>=22)
      parts.push(`<text x="${cx+col.w/2+DX*.35}" y="${ty-DY*.35+5}" text-anchor="middle" font-size="10" font-family="sans-serif">${CAT_ICO[col.prod.cat]||'📦'}</text>`);
  });
  if(emptyW>4){
    const ex=origX+filledW, ty=origY-loadH;
    parts.push(`<polygon points="${ex},${ty} ${ex+emptyW},${ty} ${ex+emptyW+DX},${ty-DY} ${ex+DX},${ty-DY}" fill="#0d1829" stroke="#1e304a" stroke-width="0.4" stroke-dasharray="4,3" opacity="0.5"/>`);
  }

  // ── 3) Front faces (box layers with crease, dividers, highlights) ───────────
  cols.forEach(col=>{
    const [cF]=C3D[col.prod.cat]||C3D.generic;
    const cx=origX+col.x;
    for(let l=0;l<MAX_LAYERS;l++){
      const fy=origY-(l+1)*LAYER_H;
      parts.push(`<rect x="${cx}" y="${fy}" width="${col.w}" height="${LAYER_H}" fill="${cF}" stroke="rgba(0,0,0,.3)" stroke-width="0.9"/>`);
      // Lit top edge (box lid highlight)
      parts.push(`<rect x="${cx+1}" y="${fy+1}" width="${col.w-2}" height="2" fill="rgba(255,255,255,.25)" rx="1"/>`);
      // Horizontal crease
      parts.push(`<line x1="${cx+2}" y1="${fy+LAYER_H*.52}" x2="${cx+col.w-2}" y2="${fy+LAYER_H*.52}" stroke="rgba(0,0,0,.15)" stroke-width="0.5"/>`);
      // Vertical box dividers
      const nb=Math.max(1,Math.min(4,Math.round(col.w/26)));
      for(let b=1;b<nb;b++){
        const bx=cx+Math.round(b/nb*col.w);
        parts.push(`<line x1="${bx}" y1="${fy+1}" x2="${bx}" y2="${fy+LAYER_H-1}" stroke="rgba(0,0,0,.15)" stroke-width="0.5"/>`);
      }
    }
    // Product name + qty centered on front face (wide columns only)
    if(col.w>=38){
      const midY=origY-loadH*0.5;
      const nm=col.prod.denom.split(' ').slice(0,2).join(' ').slice(0,Math.floor((col.w-8)/5.5));
      const qs=col.prod.qty>0?col.prod.qty+'cj':'';
      const th=qs?28:18;
      parts.push(`<rect x="${cx+3}" y="${midY-th/2}" width="${col.w-6}" height="${th}" rx="4" fill="rgba(0,0,0,.42)"/>`);
      parts.push(`<text x="${cx+col.w/2}" y="${midY+(qs?-3:4)}" text-anchor="middle" font-size="9" fill="#fff" font-weight="800" letter-spacing="0.3" font-family="sans-serif">${nm}</text>`);
      if(qs) parts.push(`<text x="${cx+col.w/2}" y="${midY+12}" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,.82)" font-weight="700" font-family="sans-serif">${qs}</text>`);
    }
  });
  // Empty ghost front face
  if(emptyW>4){
    const ex=origX+filledW;
    parts.push(`<rect x="${ex}" y="${origY-loadH}" width="${emptyW}" height="${loadH}" fill="#0d1829" stroke="#1e304a" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.45"/>`);
  }

  // ── 4) Client dividers (dashed vertical line between stops) ──────────────
  for(let i=1;i<cols.length;i++){
    if(cols[i].prod.si!==cols[i-1].prod.si){
      const dx2=origX+cols[i].x;
      parts.push(`<line x1="${dx2}" y1="${origY-loadH}" x2="${dx2}" y2="${origY}" stroke="rgba(255,255,255,.3)" stroke-width="1.5" stroke-dasharray="3,2"/>`);
    }
  }

  // ── 5) Column labels ─────────────────────────────────────────────────────
  cols.forEach(col=>{
    const [cF]=C3D[col.prod.cat]||C3D.generic;
    const cx=origX+col.x, ly=origY+4;
    parts.push(`<rect x="${cx+1}" y="${ly}" width="${col.w-2}" height="18" rx="3" fill="${cF}22" stroke="${cF}55" stroke-width="0.8"/>`);
    if(col.w>=28){
      const lbl=col.prod.denom.split(' ').slice(0,2).join(' ').slice(0,col.w<50?7:10);
      const qty=col.prod.qty>0?` ${col.prod.qty}cj`:'';
      parts.push(`<text x="${cx+col.w/2}" y="${ly+12}" text-anchor="middle" font-size="7" fill="${cF}" font-weight="700" font-family="sans-serif">${lbl}${qty}</text>`);
    } else {
      parts.push(`<text x="${cx+col.w/2}" y="${ly+13}" text-anchor="middle" font-size="11" font-family="sans-serif">${CAT_ICO[col.prod.cat]||'📦'}</text>`);
    }
  });

  // ── 6) % fill badge ──────────────────────────────────────────────────────
  const pct=Math.round(totalFrac*100);
  parts.push(`<rect x="${svgW-PAD-46}" y="${PAD}" width="46" height="18" rx="5" fill="#0f1a2e" stroke="${accentColor}44" stroke-width="1"/>`);
  parts.push(`<text x="${svgW-PAD-23}" y="${PAD+12}" text-anchor="middle" font-size="9" font-weight="800" fill="${accentColor}" font-family="sans-serif">${pct}% ple</text>`);

  // ── 7) Color legend ───────────────────────────────────────────────────────
  {
    const legY=origY+LABY+6;
    parts.push(`<rect x="${origX}" y="${legY-3}" width="${PW}" height="20" rx="4" fill="#0a1220"/>`);
    let lx=origX+6;
    [...new Set(cols.map(c=>c.prod.cat))].forEach(cat=>{
      if(lx>origX+PW-24) return;
      const [cF]=C3D[cat]||C3D.generic;
      const lbl=(CAT_LBL[cat]||cat).slice(0,10);
      parts.push(`<rect x="${lx}" y="${legY+1}" width="9" height="9" rx="2" fill="${cF}"/>`);
      parts.push(`<text x="${lx+12}" y="${legY+9}" font-size="8" fill="#64748b" font-family="sans-serif">${lbl}</text>`);
      lx+=12+lbl.length*4.6+8;
    });
  }

  return `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" style="display:block">${parts.join('')}</svg>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>

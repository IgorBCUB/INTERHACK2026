<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Damm — App Conductor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f8f9fa;--card:#ffffff;--primary:#e8001c;--primary-fg:#fff;
  --muted:#6b7280;--border:#e5e7eb;--success:#16a34a;--warning:#d97706;
  --text:#111827;--text2:#374151;--accent:#fef2f2;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto}

/* Header */
.app-header{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px}
.app-logo{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:18px;flex-shrink:0}
.app-title{font-size:15px;font-weight:800;color:var(--text)}
.app-sub{font-size:11px;color:var(--muted)}
.selector-wrap{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
select.route-sel{font-size:11px;padding:3px 8px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);font-weight:600;cursor:pointer;max-width:140px}

/* Screens */
.screen{display:none;flex-direction:column;min-height:calc(100vh - 57px)}
.screen.active{display:flex}

/* ── SCREEN: selector ── */
.sel-screen{padding:20px 16px;gap:12px;background:var(--bg)}
.sel-day-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;flex-shrink:0}
.sel-day-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sel-day-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.sel-vehicle-list{display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.sel-vcard{background:#fff;border-radius:16px;border:1px solid var(--border);padding:14px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s}
.sel-vcard:hover{border-color:var(--primary);box-shadow:0 2px 8px #e8001c22}
.sel-vcard.selected{border-color:var(--primary);background:var(--accent)}
.sel-vicon{width:44px;height:44px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sel-vinfo{flex:1}
.sel-vname{font-size:13px;font-weight:800;color:var(--text)}
.sel-vsub{font-size:11px;color:var(--muted);margin-top:1px}
.sel-vstats{display:flex;gap:10px;margin-top:6px}
.sel-vstat{font-size:11px;color:var(--primary);font-weight:700}
.btn-start{background:var(--primary);color:#fff;border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-start:disabled{opacity:.4;cursor:not-allowed}

/* ── SCREEN: navigation (map + next stop) ── */
.nav-map{height:45vh;min-height:280px;position:relative;background:#e5e7eb}
#leaflet-map{height:100%;width:100%}
.co2-badge{position:absolute;top:10px;right:10px;z-index:400;background:#fff;border-radius:12px;padding:6px 10px;box-shadow:0 2px 8px #0003;font-size:10px;font-weight:700}
.co2-badge .co2-val{font-size:16px;font-weight:900;color:var(--success)}
.co2-badge .co2-lbl{color:var(--muted);font-size:9px}
.nav-body{padding:14px;display:flex;flex-direction:column;gap:10px;flex:1}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat-card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:10px;text-align:center}
.stat-val{font-size:18px;font-weight:900;color:var(--text)}
.stat-lbl{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-top:1px}
.next-stop-card{background:#fff;border-radius:16px;border:1px solid var(--border);padding:14px}
.next-stop-label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted)}
.next-stop-num{width:44px;height:44px;border-radius:12px;background:var(--primary);color:#fff;font-weight:900;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.next-stop-name{font-size:17px;font-weight:900;color:var(--text);line-height:1.2}
.next-stop-addr{font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px}
.stop-list-mini{display:flex;flex-direction:column;gap:4px;max-height:120px;overflow-y:auto}
.stop-mini{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;font-size:11px;cursor:pointer}
.stop-mini.done{opacity:.4;text-decoration:line-through}
.stop-mini.active{background:var(--accent);border:1px solid var(--primary)}
.stop-mini-num{width:20px;height:20px;border-radius:6px;background:var(--border);font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stop-mini.active .stop-mini-num{background:var(--primary);color:#fff}
.stop-mini.done .stop-mini-num{background:var(--success);color:#fff}

/* ── SCREEN: active stop ── */
.stop-screen{padding:14px;display:flex;flex-direction:column;gap:10px;flex:1}
.stop-header-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:14px}
.stop-num-badge{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted)}
.stop-name-big{font-size:22px;font-weight:900;color:var(--text);line-height:1.2;margin-top:4px}
.stop-addr-line{font-size:12px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px}
.access-badge{border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;border:2px solid}
.access-badge.rear{background:#fef3c7;border-color:#d97706}
.access-badge.left,.access-badge.right{background:#eff6ff;border-color:#3b82f6}
.access-icon{font-size:22px}
.access-text{font-size:13px;font-weight:700}
.access-sub{font-size:11px;color:var(--muted)}
.products-title{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted)}
.prod-list{background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden}
.prod-list-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:#f9fafb}
.prod-list-hdr-title{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--muted)}
.prod-list-prog{font-size:12px;font-weight:800;color:var(--primary)}
.prod-prog-bar{height:3px;background:var(--border)}
.prod-prog-fill{height:100%;background:var(--success);transition:width .3s}
.prod-item{padding:11px 14px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent}
.prod-item:last-child{border:none}
.prod-item.done{background:#f0fdf4}
.prod-chk{width:28px;height:28px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:all .15s}
.prod-item.done .prod-chk{background:var(--success);border-color:var(--success);color:#fff}
.prod-ico{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.prod-info{flex:1;min-width:0}
.prod-denom{font-size:12px;font-weight:700;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prod-mat{font-size:10px;color:var(--muted);margin-top:1px}
.prod-qty-badge{font-size:18px;font-weight:900;color:var(--primary);flex-shrink:0}
.prod-unit{font-size:9px;color:var(--muted);text-align:right}
.frag-warn{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:8px 12px;font-size:12px;color:#9a3412;font-weight:600}
.return-card{background:#fff7ed;border:2px solid var(--warning);border-radius:16px;padding:14px;display:flex;align-items:flex-start;gap:12px}
.return-icon{font-size:24px;flex-shrink:0}
.return-title{font-size:10px;font-weight:700;text-transform:uppercase;color:#92400e}
.return-text{font-size:14px;font-weight:800;color:var(--text);line-height:1.3;margin-top:2px}

/* ── Truck position strip ── */
.truck-pos{background:#fff;border-radius:14px;border:1px solid var(--border);padding:12px 14px}
.truck-pos-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.tps-bar{display:flex;gap:3px;align-items:center}
.tps-depot{font-size:9px;color:var(--muted);font-weight:700;flex-shrink:0;padding:0 4px}
.tps-seg{flex:1;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;transition:all .2s;position:relative}
.tps-seg.active{transform:scaleY(1.18);box-shadow:0 0 0 2px #1e3a5f,0 2px 8px rgba(0,0,0,.25);z-index:1}
.tps-seg.done-s{opacity:.35}
.tps-seg.empty-s{background:#e5e7eb;color:#9ca3af}

/* ── Big action button ── */
.sticky-btn{position:sticky;bottom:0;background:rgba(248,249,250,.92);backdrop-filter:blur(8px);padding:12px 16px;border-top:1px solid var(--border)}
.big-btn{width:100%;padding:16px;border-radius:16px;border:none;font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.big-btn.primary{background:var(--primary);color:#fff}
.big-btn.primary:active{background:#be123c}
.big-btn.success{background:var(--success);color:#fff}
.big-btn.success:active{background:#15803d}
.big-btn:disabled{opacity:.4;cursor:not-allowed}

/* Progress bar */
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:2px;background:var(--primary);transition:width .4s}

/* TW badge */
.tw-badge{display:inline-flex;align-items:center;gap:4px;background:#eff6ff;border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;color:#1d4ed8;margin-top:4px}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo">D</div>
  <div>
    <div class="app-title">Damm — Conductor</div>
    <div class="app-sub" id="header-sub">Selecciona la teva ruta</div>
  </div>
  <div class="selector-wrap">
    <select class="route-sel" id="day-sel" onchange="onDayChange()">
      <option value="">Selecciona dia</option>
    </select>
  </div>
</div>

<!-- SCREEN 0: Vehicle selector -->
<div class="screen active sel-screen" id="screen-sel">
  <div class="sel-day-tabs" id="day-tabs"></div>
  <div class="sel-vehicle-list" id="vehicle-list"></div>
  <div class="sticky-btn">
    <button class="big-btn primary" id="btn-start-route" disabled onclick="startRoute()">
      🚛 Iniciar ruta
    </button>
  </div>
</div>

<!-- SCREEN 1: Navigation + map -->
<div class="screen" id="screen-nav">
  <div class="nav-map">
    <div id="leaflet-map"></div>
    <div class="co2-badge">
      <div class="co2-val" id="co2-saved">—</div>
      <div class="co2-lbl">kg CO₂ estalviat</div>
    </div>
  </div>
  <div class="nav-body">
    <div class="stats-row" id="nav-stats"></div>
    <div class="next-stop-card" id="next-stop-card"></div>
    <div class="stop-list-mini" id="stop-list-mini"></div>
  </div>
  <div class="sticky-btn" style="display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;gap:8px">
      <button class="big-btn primary" id="btn-nav-action" style="flex:1" onclick="goToStop()">
        🧭 Iniciar parada
      </button>
      <button id="btn-gmaps-next" onclick="openGoogleMapsNext()" title="Navegar a la pròxima parada" style="padding:0 18px;border-radius:16px;border:2px solid var(--primary);background:#fff;color:var(--primary);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800">🗺</button>
    </div>
    <button onclick="openGoogleMapsTrip()" style="width:100%;padding:9px;border-radius:12px;border:1.5px dashed var(--primary);background:transparent;color:var(--primary);font-size:12px;font-weight:700;cursor:pointer">
      📍 Veure ruta completa a Google Maps
    </button>
  </div>
</div>

<!-- SCREEN 2: Active stop -->
<div class="screen" id="screen-stop">
  <div class="stop-screen" id="stop-body"></div>
  <div class="sticky-btn">
    <button class="big-btn success" id="btn-deliver" onclick="confirmDelivery()">
      ✅ Productes entregats
    </button>
  </div>
</div>

<!-- SCREEN 3: Finished -->
<div class="screen" id="screen-done">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;text-align:center">
    <div style="font-size:60px">🎉</div>
    <div style="font-size:24px;font-weight:900;color:var(--text)">Ruta completada!</div>
    <div style="font-size:14px;color:var(--muted)" id="done-stats"></div>
    <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:16px;padding:16px;width:100%">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;color:#15803d">Impacte ambiental</div>
      <div style="font-size:28px;font-weight:900;color:var(--success);margin:6px 0" id="done-co2"></div>
      <div style="font-size:12px;color:var(--muted)">kg de CO₂ estalviats vs ruta no optimitzada</div>
    </div>
  </div>
  <div class="sticky-btn">
    <button class="big-btn primary" onclick="resetApp()">← Tornar a l'inici</button>
  </div>
</div>

<script>
let ALL_ROUTES = [];
let WH_DATA = [];
let prodChecked = new Set();   // tracks checked product indices for current stop
let currentRoutes = [];   // routes for selected day
let selectedRoute = null; // the chosen vehicle route
let sequence = [];        // stops + reload steps interleaved
let currentIdx = 0;       // index into sequence (not just stops)
let map = null;
let mapMarkers = [];
let routeLine = null;
let selectedDay = null;

// Build sequence with reload steps inserted between trips
function buildSequence(route) {
  const seq = [];
  let lastTripNum = null;
  let tripCount = 0;
  route.stops.forEach(stop => {
    if (lastTripNum !== null && stop.trip_num !== lastTripNum) {
      // Insert warehouse return step
      tripCount++;
      seq.push({
        type: 'reload',
        trip_from: lastTripNum,
        trip_to: stop.trip_num,
        reload_num: tripCount,
        depot: route.depot,
      });
    }
    seq.push({ type: 'stop', ...stop });
    lastTripNum = stop.trip_num;
  });
  return seq;
}

// Count only real stops (not reload steps) up to index
function countStops(upTo) {
  return sequence.slice(0, upTo).filter(s => s.type === 'stop').length;
}
function totalStops() {
  return sequence.filter(s => s.type === 'stop').length;
}

const DAYS_ORDER = ["16/03/2026","17/03/2026","18/03/2026","19/03/2026","20/03/2026"];
const WEEKDAYS   = {
  "16/03/2026":"Dilluns","17/03/2026":"Dimarts","18/03/2026":"Dimecres",
  "19/03/2026":"Dijous","20/03/2026":"Divendres"
};

async function init() {
  [ALL_ROUTES, WH_DATA] = await Promise.all([
    fetch('results_driver.json').then(r => r.json()),
    fetch('results_warehouse.json').then(r => r.json()),
  ]);
  buildDayTabs();
  selectDay(DAYS_ORDER[0]);
}

function buildDayTabs() {
  const tabs = document.getElementById('day-tabs');
  const sel  = document.getElementById('day-sel');
  tabs.innerHTML = '';
  DAYS_ORDER.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'sel-day-tab';
    btn.textContent = WEEKDAYS[d] || d;
    btn.onclick = () => selectDay(d);
    btn.dataset.day = d;
    tabs.appendChild(btn);
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = WEEKDAYS[d] || d;
    sel.appendChild(opt);
  });
}

function selectDay(d) {
  selectedDay = d;
  selectedRoute = null;
  document.querySelectorAll('.sel-day-tab').forEach(b => b.classList.toggle('active', b.dataset.day === d));
  document.getElementById('day-sel').value = d;
  currentRoutes = ALL_ROUTES.filter(r => r.date === d);
  renderVehicleList();
  document.getElementById('btn-start-route').disabled = true;
}

function onDayChange() {
  selectDay(document.getElementById('day-sel').value);
}

function renderVehicleList() {
  const el = document.getElementById('vehicle-list');
  el.innerHTML = '';
  if (!currentRoutes.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Sense rutes per a aquest dia</div>';
    return;
  }
  currentRoutes.forEach(route => {
    const isSel = selectedRoute && selectedRoute.vehicle_id === route.vehicle_id;
    const icon = route.vehicle_type === 'van_3' ? '🚐' : route.vehicle_type === 'truck_8' ? '🚛' : '🚚';
    const card = document.createElement('div');
    card.className = 'sel-vcard' + (isSel ? ' selected' : '');
    card.innerHTML = `
      <div class="sel-vicon">${icon}</div>
      <div class="sel-vinfo">
        <div class="sel-vname">${route.vehicle_id}</div>
        <div class="sel-vsub">${route.vehicle_label} · ${route.driver_name.split(' ')[0]}</div>
        <div class="sel-vstats">
          <span class="sel-vstat">🛑 ${route.n_stops} parades</span>
          <span class="sel-vstat">⏱ ${route.total_time_fmt}</span>
          <span class="sel-vstat">⛽ ${route.total_fuel_l}L</span>
        </div>
      </div>`;
    card.onclick = () => {
      selectedRoute = route;
      document.getElementById('btn-start-route').disabled = false;
      renderVehicleList();
    };
    el.appendChild(card);
  });
}

function startRoute() {
  if (!selectedRoute) return;
  sequence = buildSequence(selectedRoute);
  currentIdx = 0;
  showScreen('nav');
  document.getElementById('header-sub').textContent = selectedRoute.vehicle_id + ' · ' + WEEKDAYS[selectedDay];
  document.getElementById('co2-saved').textContent = selectedRoute.co2_saved_kg;
  renderNavStats();
  renderNextStopCard();
  renderStopListMini();
  initMap();
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ── Map ───────────────────────────────────────────────────────────────────────
function initMap() {
  if (map) { map.remove(); map = null; }
  const depot = selectedRoute.depot;
  map = L.map('leaflet-map', { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  // Draw one polyline per trip segment (different color for each trip)
  const tripColors = ['#e8001c','#1d4ed8','#15803d','#d97706','#7c3aed','#0891b2'];
  const realStops = sequence.filter(s => s.type === 'stop');
  let currentTripNum = null;
  let segmentCoords = [[depot.lat, depot.lon]];
  let tripIdx = 0;

  realStops.forEach((stop, i) => {
    if (currentTripNum !== null && stop.trip_num !== currentTripNum) {
      // Close current segment back to depot
      segmentCoords.push([depot.lat, depot.lon]);
      L.polyline(segmentCoords, { color: tripColors[tripIdx % tripColors.length], weight: 3, opacity: 0.75 }).addTo(map);
      tripIdx++;
      segmentCoords = [[depot.lat, depot.lon]];
    }
    segmentCoords.push([stop.lat, stop.lon]);
    currentTripNum = stop.trip_num;
  });
  // Last segment
  segmentCoords.push([depot.lat, depot.lon]);
  L.polyline(segmentCoords, { color: tripColors[tripIdx % tripColors.length], weight: 3, opacity: 0.75 }).addTo(map);

  // Depot marker
  const depotHtml = '<div style="background:#e8001c;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;border:2px solid #fff;box-shadow:0 2px 6px #0004">D</div>';
  L.marker([depot.lat, depot.lon], { icon: L.divIcon({ html: depotHtml, className:'', iconAnchor:[14,14] }) }).addTo(map);

  // Stop markers — numbered only by real stops
  let stopCounter = 0;
  sequence.forEach((item, seqI) => {
    if (item.type !== 'stop') return;
    stopCounter++;
    const done = seqI < currentIdx && item.type === 'stop' ||
                 (currentIdx > seqI);
    const active = seqI === currentIdx;
    const color = done ? '#16a34a' : active ? '#e8001c' : tripColors[(item.trip_num - 1) % tripColors.length];
    const size = active ? 28 : 22;
    const icon = L.divIcon({
      html: `<div style="background:${color};color:#fff;border-radius:50%;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:${active?12:10}px;border:2px solid #fff;box-shadow:0 2px 6px #0004">${done?'✓':stopCounter}</div>`,
      className:'', iconAnchor:[size/2, size/2]
    });
    L.marker([item.lat, item.lon], { icon }).addTo(map);
  });

  // Fit map to all stops
  const allCoords = [[depot.lat, depot.lon], ...realStops.map(s => [s.lat, s.lon])];
  map.fitBounds(L.latLngBounds(allCoords), { padding: [30, 30] });
}

function renderNavStats() {
  const r = selectedRoute;
  const nReloads = r.n_trips - 1;
  document.getElementById('nav-stats').innerHTML = `
    <div class="stat-card"><div class="stat-val">${r.total_km}</div><div class="stat-lbl">Km</div></div>
    <div class="stat-card"><div class="stat-val">${r.total_time_fmt}</div><div class="stat-lbl">Temps</div></div>
    <div class="stat-card"><div class="stat-val">${r.n_stops}${nReloads>0?'<span style="font-size:10px;color:var(--warning)"> +'+nReloads+'R</span>':''}</div><div class="stat-lbl">Parades</div></div>`;
}

  if (currentIdx >= sequence.length) { renderDone(); return; }
  const item = sequence[currentIdx];
  const nDone = countStops(currentIdx);
  const nTotal = totalStops();
  const pct = nDone / nTotal * 100;

  if (item.type === 'reload') {
    document.getElementById('next-stop-card').innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div style="width:36px;height:36px;border-radius:10px;background:#d97706;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🏭</div>
        <div>
          <div class="next-stop-label" style="color:#d97706">Recàrrega ${item.reload_num} — Tornar al magatzem</div>
          <div class="next-stop-name" style="font-size:15px">Centre Damm Mollet</div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--muted)">Finalitza la ruta ${item.trip_from} · Carrega la ruta ${item.trip_to}</div>
      <div class="prog-bar" style="margin-top:8px"><div class="prog-fill" style="width:${pct}%;background:#d97706"></div></div>`;

    // Change nav button to "Anar al magatzem"
    const navBtn = document.querySelector('#screen-nav .sticky-btn .big-btn');
    if (navBtn) { navBtn.textContent = '🏭 Anar al magatzem'; navBtn.onclick = goToReload; }
  } else {
    const s = item;
    const tw = s.tw_close < 86399 ? `<div class="tw-badge">🕐 ${fmtTime(s.tw_open)}–${fmtTime(s.tw_close)}</div>` : '';
    document.getElementById('next-stop-card').innerHTML = `
      <div class="next-stop-label">Pròxima parada (${nDone+1}/${nTotal}) · Ruta ${s.trip_num}</div>
      <div style="display:flex;align-items:flex-start;gap:10px;margin-top:8px">
        <div class="next-stop-num">${nDone+1}</div>
        <div>
          <div class="next-stop-name">${s.name}</div>
          <div class="next-stop-addr">📍 ${s.city} <button onclick="openGoogleMapsStop(${s.lat},${s.lon})" style="margin-left:6px;padding:2px 8px;border-radius:8px;border:1px solid var(--primary);background:#fff;color:var(--primary);font-size:10px;font-weight:700;cursor:pointer">🗺 Maps</button></div>
          ${tw}
        </div>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>`;
    const navBtn = document.querySelector('#screen-nav .sticky-btn .big-btn');
    if (navBtn) { navBtn.textContent = '🧭 Iniciar parada'; navBtn.onclick = goToStop; }
  }
}

function renderStopListMini() {
  const el = document.getElementById('stop-list-mini');
  let stopCounter = 0;
  el.innerHTML = sequence.map((item, seqI) => {
    if (item.type === 'reload') {
      const done = seqI < currentIdx;
      return `<div class="stop-mini ${done?'done':''}" style="background:${done?'#f0fdf4':'#fff7ed'};border-left:3px solid #d97706">
        <div class="stop-mini-num" style="background:#d97706;color:#fff">${done?'✓':'↩'}</div>
        <span style="flex:1;font-weight:700;color:#92400e">Recàrrega ${item.reload_num} — Magatzem</span>
      </div>`;
    }
    stopCounter++;
    const localNum = stopCounter;
    const done = seqI < currentIdx;
    const active = seqI === currentIdx;
    const tripColor = ['#e8001c','#1d4ed8','#15803d','#d97706','#7c3aed'][((item.trip_num||1)-1)%5];
    return `<div class="stop-mini ${done?'done':''} ${active?'active':''}" onclick="jumpToIdx(${seqI})">
      <div class="stop-mini-num" style="${active?'background:'+tripColor+';color:#fff':done?'background:#16a34a;color:#fff':''}">${done?'✓':localNum}</div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.name}</span>
      <span style="color:${tripColor};font-size:9px;font-weight:700">R${item.trip_num}</span>
      <span style="color:var(--muted);font-size:10px">${item.boxes|0}cj</span>
    </div>`;
  }).join('');
}

function jumpToIdx(i) {
  currentIdx = i;
  initMap();
  renderNextStopCard();
  renderStopListMini();
}

function goToStop() {
  if (currentIdx >= sequence.length) return;
  if (sequence[currentIdx].type === 'reload') { goToReload(); return; }
  showScreen('stop');
  renderStopScreen();
}

function goToReload() {
  showScreen('stop');
  renderReloadScreen();
}

      <button onclick="openGoogleMapsDepot()" style="margin-top:12px;width:100%;padding:11px;border-radius:12px;border:none;background:#d97706;color:#fff;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">🗺 Navegar al magatzem</button>

// ── Stop screen ───────────────────────────────────────────────────────────────
function renderStopScreen() {
  const s = sequence[currentIdx];
  if (s.type === 'reload') { renderReloadScreen(); return; }

  const stopNum = countStops(currentIdx) + 1;
  const nTotal  = totalStops();
  const fragColor = s.fragility >= 3 ? '#991b1b' : s.fragility >= 2 ? '#92400e' : '#15803d';
  const fragLabel = ['OK','Normal','⚠ Fràgil','🔴 Molt fràgil'][Math.min(s.fragility, 3)];
  const accessType = s.fragility >= 2 ? 'rear' : (stopNum % 2 === 0 ? 'left' : 'right');
  const accessLabels = {rear:{icon:'🚪',text:'Porta del Darrere',cls:'rear'}, left:{icon:'◀',text:'Lona Lateral Esquerra',cls:'left'}, right:{icon:'▶',text:'Lona Lateral Dreta',cls:'right'}};
  const acc = accessLabels[accessType];
  const tw = s.tw_close < 86399 ? `<div class="tw-badge">🕐 ${fmtTime(s.tw_open)}–${fmtTime(s.tw_close)}</div>` : '';
  const section = ['A','B','C'][(stopNum - 1) % 3];
  const tripColors = ['#e8001c','#1d4ed8','#15803d','#d97706','#7c3aed'];
  const tripColor = tripColors[(s.trip_num - 1) % tripColors.length];

  const fragWarn = s.fragility >= 2
    ? `<div class="frag-warn">⚠ Producte fràgil — col·locar a dalt del palet, NO apilar pesats al damunt</div>` : '';

  // ── Get client products from warehouse checklist ───────────────────────────
  const whDay  = WH_DATA.find(d => d.date === selectedDay);
  const whVP   = whDay?.vehicle_plans?.find(v => v.vehicle_id === selectedRoute?.vehicle_id);
  const whTrip = whVP?.trips?.find(t => t.trip_num === s.trip_num);
  const clientEntry = whTrip?.client_checklist?.find(c => c.client_id === s.client_id);
  const stopProducts = clientEntry?.products || [];
  prodChecked = new Set();

  document.getElementById('btn-deliver').textContent = '✅ Productes entregats';
  document.getElementById('stop-body').innerHTML = `
    <div class="stop-header-card">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="stop-num-badge">Parada ${stopNum}/${nTotal}</div>
        <div style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:${tripColor}22;color:${tripColor}">Ruta ${s.trip_num}</div>
      </div>
      <div class="stop-name-big">${s.name}</div>
      <div class="stop-addr-line">📍 ${s.city} <button onclick="openGoogleMapsStop(${s.lat},${s.lon})" style="margin-left:8px;padding:3px 10px;border-radius:8px;border:1.5px solid var(--primary);background:#fff;color:var(--primary);font-size:11px;font-weight:700;cursor:pointer">🗺 Navegar</button></div>
      ${tw}
    </div>
    <div class="access-badge ${acc.cls}">
      <div class="access-icon">${acc.icon}</div>
      <div>
        <div class="access-text">${acc.text}</div>
        <div class="access-sub">Zona almacén ${s.warehouse_zone}</div>
      </div>
    </div>
    <div class="products-title">A entregar</div>
    ${buildProductChecklist(stopProducts, s.fragility)}
    ${fragWarn}`;
}

// ── Category labels + icons (needed by drawPallet3D) ─────────────────────────
const CAT_LBL = {beer:'Cerveza',water:'Agua',wine:'Vi',softdrink:'Refresc',dairy:'Làctic',coffee:'Cafè',sweetener:'Edulcorant',packaging:'Embalatge',empty_pkg:'Envàs buit',generic:'Genèric',utensil:'Utensili',icecream:'Gelat',juice:'Suc'};
const CAT_ICO = {beer:'🍺',water:'💧',wine:'🍷',softdrink:'🥤',dairy:'🥛',coffee:'☕',sweetener:'🍬',packaging:'📦',empty_pkg:'♻️',generic:'📦',utensil:'🍴',icecream:'🍦',juice:'🧃'};

// ── 3D Pallet colours (front / top / right-side) ─────────────────────────────
const C3D = {
  beer:      ['#b45309','#f59e0b','#78350f'],
  water:     ['#1d4ed8','#60a5fa','#1e3a8a'],
  wine:      ['#6d28d9','#c084fc','#4c1d95'],
  softdrink: ['#065f46','#34d399','#064e3b'],
  dairy:     ['#0369a1','#7dd3fc','#0c4a6e'],
  coffee:    ['#44403c','#a8a29e','#1c1917'],
  sweetener: ['#7e22ce','#e879f9','#581c87'],
  packaging: ['#3f6212','#a3e635','#365314'],
  empty_pkg: ['#374151','#9ca3af','#111827'],
  icecream:  ['#be185d','#f9a8d4','#831843'],
  juice:     ['#b45309','#fbbf24','#92400e'],
  generic:   ['#374151','#9ca3af','#1f2937'],
  utensil:   ['#44403c','#a8a29e','#1c1917'],
};

function drawPallet3D(allLayers, currentClientId) {
  if (!allLayers || !allLayers.length) return '';

  // ── Gather products ───────────────────────────────────────────────────────
  const products=[];
  allLayers.forEach(lyr=>{
    const isMine=lyr.client_id===currentClientId;
    // main_cats values are absolute pallet fractions — use directly, no multiply
    const allCats = {...(lyr.main_cats||{}), ...(lyr.mixed_cats||{})};
    let raw;
    if (lyr.products && lyr.products.length) {
      raw = lyr.products;
    } else if (Object.keys(allCats).length > 0) {
      // Sort by value desc, guarantee at least the top category always renders
      const entries = Object.entries(allCats).sort((a,b)=>b[1]-a[1]);
      const topFrac = entries[0][1];
      raw = entries.map(([cat,frac])=>({
        cat, denom:CAT_LBL[cat]||cat,
        // Normalise so top category always has at least 0.05 visual width
        pallet_frac: Math.max(0.001, frac > 0 ? Math.max(frac, topFrac * 0.15) : 0),
        qty: Math.round((lyr.boxes||1) * (frac / (topFrac||1)))
      }));
    } else {
      // No category data at all — show as generic with box count
      raw = [{cat:'generic',denom:'Caixes',pallet_frac:Math.max(0.05,lyr.pallet_frac||0.1),qty:lyr.boxes||1}];
    }
    raw.filter(p=>(p.pallet_frac||0)>0).forEach(p=>products.push({
      cat:p.cat||'generic',denom:p.denom||(CAT_LBL[p.cat]||p.cat),
      frac:Math.max(0.01,p.pallet_frac||0.02),qty:p.qty||0,
      isMine,weight:p.weight||lyr.weight||2,
    }));
  });
  products.sort((a,b)=>b.weight-a.weight);
  // Absolute fallback: 1 generic column so cube always renders
  if(!products.length) products.push({cat:'generic',denom:'Caixes',frac:0.1,qty:0,isMine:true,weight:2});
  const totalFrac=Math.min(0.85,products.reduce((s,p)=>s+p.frac,0));

  // ── Layout (light theme version of warehouse.html drawPallet3D_dark) ──────
  const LAYER_H=18,MAX_LAYERS=7,PW=130,DX=44,DY=22,PAD=10,LABY=22,LEGH=30;
  const loadH=MAX_LAYERS*LAYER_H;
  const svgW=2*PAD+PW+DX+4, svgH=loadH+DY+PAD*2+LABY+LEGH+4;
  const origX=PAD, origY=svgH-PAD-LABY-LEGH-4;

  const filledW=Math.round(totalFrac/0.85*PW), emptyW=PW-filledW;
  const cols=[];
  {
    const raws=products.map(p=>({p,wr:Math.max(8,p.frac/totalFrac*filledW)}));
    const tw=raws.reduce((s,c)=>s+c.wr,0)||1;
    let xc=0;
    raws.forEach((c,i)=>{
      const w=i===raws.length-1?filledW-xc:Math.max(8,Math.round(c.wr/tw*filledW));
      cols.push({prod:c.p,x:xc,w}); xc+=w;
    });
  }

  const parts=[];

  // ── 1) Right side face ────────────────────────────────────────────────────
  {
    const rsX=origX+PW, rsTopY=origY-loadH;
    const cS=emptyW>4?'#d1dae8':(C3D[cols[cols.length-1].prod.cat]||C3D.generic)[2];
    parts.push(`<polygon points="${rsX},${rsTopY} ${rsX+DX},${rsTopY-DY} ${rsX+DX},${origY-DY} ${rsX},${origY}" fill="${cS}" stroke="rgba(0,0,0,.15)" stroke-width="0.5"/>`);
    for(let l=1;l<MAX_LAYERS;l++){
      const ly=origY-l*LAYER_H;
      parts.push(`<line x1="${rsX}" y1="${ly}" x2="${rsX+DX}" y2="${ly-DY}" stroke="rgba(0,0,0,.18)" stroke-width="0.5"/>`);
    }
  }

  // ── 2) Top faces ──────────────────────────────────────────────────────────
  cols.forEach(col=>{
    const [,cT]=C3D[col.prod.cat]||C3D.generic;
    const cx=origX+col.x, ty=origY-loadH;
    parts.push(`<polygon points="${cx},${ty} ${cx+col.w},${ty} ${cx+col.w+DX},${ty-DY} ${cx+DX},${ty-DY}" fill="${cT}" stroke="rgba(0,0,0,.12)" stroke-width="0.5"/>`);
    if(col.w>=22)
      parts.push(`<text x="${cx+col.w/2+DX*.35}" y="${ty-DY*.35+5}" text-anchor="middle" font-size="10" font-family="sans-serif">${CAT_ICO[col.prod.cat]||'📦'}</text>`);
  });
  if(emptyW>4){
    const ex=origX+filledW, ty=origY-loadH;
    parts.push(`<polygon points="${ex},${ty} ${ex+emptyW},${ty} ${ex+emptyW+DX},${ty-DY} ${ex+DX},${ty-DY}" fill="#e8edf3" stroke="#c5ccd8" stroke-width="0.4" stroke-dasharray="4,3" opacity="0.8"/>`);
  }

  // ── 3) Front faces ────────────────────────────────────────────────────────
  cols.forEach(col=>{
    const [cF]=C3D[col.prod.cat]||C3D.generic;
    const cx=origX+col.x;
    for(let l=0;l<MAX_LAYERS;l++){
      const fy=origY-(l+1)*LAYER_H;
      parts.push(`<rect x="${cx}" y="${fy}" width="${col.w}" height="${LAYER_H}" fill="${cF}" stroke="rgba(0,0,0,.25)" stroke-width="0.9"/>`);
      // Lit top edge
      parts.push(`<rect x="${cx+1}" y="${fy+1}" width="${col.w-2}" height="2" fill="rgba(255,255,255,.3)" rx="1"/>`);
      parts.push(`<line x1="${cx+2}" y1="${fy+LAYER_H*.52}" x2="${cx+col.w-2}" y2="${fy+LAYER_H*.52}" stroke="rgba(0,0,0,.12)" stroke-width="0.5"/>`);
      const nb=Math.max(1,Math.min(4,Math.round(col.w/26)));
      for(let b=1;b<nb;b++){
        const bx=cx+Math.round(b/nb*col.w);
        parts.push(`<line x1="${bx}" y1="${fy+1}" x2="${bx}" y2="${fy+LAYER_H-1}" stroke="rgba(0,0,0,.12)" stroke-width="0.5"/>`);
      }
    }
    // "← TU" highlight: white dashed border over the entire column
    if(col.prod.isMine){
      parts.push(`<rect x="${cx+1}" y="${origY-loadH}" width="${col.w-2}" height="${loadH-1}" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2.5" stroke-dasharray="5,3" rx="2"/>`);
    }
    // Product name + qty centered on front face
    if(col.w>=38){
      const midY=origY-loadH*0.5;
      const nm=col.prod.denom.split(' ').slice(0,2).join(' ').slice(0,Math.floor((col.w-8)/5.5));
      const qs=col.prod.qty>0?col.prod.qty+'cj':'';
      const th=qs?28:18;
      parts.push(`<rect x="${cx+3}" y="${midY-th/2}" width="${col.w-6}" height="${th}" rx="4" fill="rgba(0,0,0,.38)"/>`);
      parts.push(`<text x="${cx+col.w/2}" y="${midY+(qs?-3:4)}" text-anchor="middle" font-size="9" fill="#fff" font-weight="800" letter-spacing="0.3" font-family="sans-serif">${nm}</text>`);
      if(qs) parts.push(`<text x="${cx+col.w/2}" y="${midY+12}" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,.85)" font-weight="700" font-family="sans-serif">${qs}</text>`);
    }
  });
  if(emptyW>4){
    const ex=origX+filledW;
    parts.push(`<rect x="${ex}" y="${origY-loadH}" width="${emptyW}" height="${loadH}" fill="#e8edf3" stroke="#c5ccd8" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.8"/>`);
  }

  // ── 4) Client dividers ────────────────────────────────────────────────────

  // ── 5) Column labels ─────────────────────────────────────────────────────
  cols.forEach(col=>{
    const [cF]=C3D[col.prod.cat]||C3D.generic;
    const cx=origX+col.x, ly=origY+4;
    const isMine=col.prod.isMine;
    parts.push(`<rect x="${cx+1}" y="${ly}" width="${col.w-2}" height="18" rx="3" fill="${isMine?'#1d4ed822':cF+'22'}" stroke="${isMine?'#1d4ed8':cF+'66'}" stroke-width="${isMine?1.2:0.8}"/>`);
    if(isMine){
      parts.push(`<text x="${cx+col.w/2}" y="${ly+12}" text-anchor="middle" font-size="7.5" fill="#1d4ed8" font-weight="900" font-family="sans-serif">← TU</text>`);
    } else if(col.w>=28){
      const lbl=col.prod.denom.split(' ').slice(0,2).join(' ').slice(0,col.w<50?7:10);
      parts.push(`<text x="${cx+col.w/2}" y="${ly+12}" text-anchor="middle" font-size="7" fill="${cF}" font-weight="700" font-family="sans-serif">${lbl}${col.prod.qty>0?' '+col.prod.qty+'cj':''}</text>`);
    } else {
      parts.push(`<text x="${cx+col.w/2}" y="${ly+13}" text-anchor="middle" font-size="11" font-family="sans-serif">${CAT_ICO[col.prod.cat]||'📦'}</text>`);
    }
  });

  // ── 6) % fill badge ──────────────────────────────────────────────────────
  const pct=Math.round(totalFrac*100);
  parts.push(`<rect x="${svgW-PAD-46}" y="${PAD}" width="46" height="18" rx="5" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>`);
  parts.push(`<text x="${svgW-PAD-23}" y="${PAD+12}" text-anchor="middle" font-size="9" font-weight="800" fill="#374151" font-family="sans-serif">${pct}% ple</text>`);

  // ── 7) Color legend ───────────────────────────────────────────────────────
  {
    const legY=origY+LABY+6;
    parts.push(`<rect x="${origX}" y="${legY-3}" width="${PW}" height="20" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.8"/>`);
    let lx=origX+6;
    [...new Set(cols.map(c=>c.prod.cat))].forEach(cat=>{
      if(lx>origX+PW-24) return;
      const [cF]=C3D[cat]||C3D.generic;
      const lbl=(CAT_LBL[cat]||cat).slice(0,10);
      parts.push(`<rect x="${lx}" y="${legY+1}" width="9" height="9" rx="2" fill="${cF}"/>`);
      parts.push(`<text x="${lx+12}" y="${legY+9}" font-size="8" fill="#6b7280" font-family="sans-serif">${lbl}</text>`);
      lx+=12+lbl.length*4.6+8;
    });
  }

  return `<svg width="100%" viewBox="0 0 ${svgW} ${svgH}" style="display:block;max-width:340px;margin:0 auto;overflow:visible">${parts.join('')}</svg>`;
}

// ── Product checklist ─────────────────────────────────────────────────────────
const CAT_ICO_D = {beer:'🍺',water:'💧',wine:'🍷',softdrink:'🥤',dairy:'🥛',coffee:'☕',sweetener:'🍬',packaging:'📦',empty_pkg:'♻️',generic:'📦',utensil:'🍴',icecream:'🍦',juice:'🧃'};

function buildProductChecklist(products, fragility) {
  if (!products || !products.length) {
    // Fallback: no product detail available
    const icon = fragility >= 2 ? '🍷' : '🍺';
    return `<div class="prod-list">
      <div class="prod-list-hdr">
        <span class="prod-list-hdr-title">Productes</span>
      </div>
      <div class="prod-item" style="cursor:default">
        <div class="prod-ico">${icon}</div>
        <div class="prod-info"><div class="prod-denom">Detall no disponible</div></div>
      </div>
    </div>`;
  }

  const total = products.length;
  const rows = products.map((p, i) => {
    const ico = CAT_ICO_D[p.cat] || '📦';
    const fragTag = p.fragility >= 2
      ? `<span style="font-size:9px;background:#fee2e2;color:#991b1b;border-radius:3px;padding:1px 4px;margin-left:4px">⚠ Fràgil</span>` : '';
    return `
      <div class="prod-item" id="prod-${i}" onclick="toggleProd(${i},${total})">
        <div class="prod-chk" id="pchk-${i}"></div>
        <div class="prod-ico">${ico}</div>
        <div class="prod-info">
          <div class="prod-denom">${p.denom}${fragTag}</div>
          <div class="prod-mat">${p.mat}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="prod-qty-badge">${p.qty|0}</div>
          <div class="prod-unit">caixes</div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="prod-list">
      <div class="prod-list-hdr">
        <span class="prod-list-hdr-title">Productes a entregar</span>
        <span class="prod-list-prog" id="prod-prog">0/${total}</span>
      </div>
      <div class="prod-prog-bar"><div class="prod-prog-fill" id="prod-pfill" style="width:0%"></div></div>
      ${rows}
    </div>`;
}

function toggleProd(i, total) {
  if (prodChecked.has(i)) prodChecked.delete(i); else prodChecked.add(i);
  const item = document.getElementById('prod-'+i);
  const chk  = document.getElementById('pchk-'+i);
  if (item) item.classList.toggle('done', prodChecked.has(i));
  if (chk)  chk.textContent = prodChecked.has(i) ? '✓' : '';
  const progTxt  = document.getElementById('prod-prog');
  const progFill = document.getElementById('prod-pfill');
  if (progTxt)  progTxt.textContent  = `${prodChecked.size}/${total}`;
  if (progFill) progFill.style.width = `${prodChecked.size/total*100}%`;
}

function renderTruckMini(activeTripNum) {
  // Total sections = total trips for this vehicle (LIFO: last trip = deepest = section 1)
  const nTrips = selectedRoute ? selectedRoute.n_trips : 1;
  const tripColors = ['#e8001c','#1d4ed8','#15803d','#d97706','#7c3aed'];

  // Section depth = (nTrips - tripNum + 1): last trip → depth 1 (deepest/FONS)
  const activeDepth = nTrips - activeTripNum + 1;

  const segs = Array.from({length: nTrips}, (_, i) => {
    const depth = i + 1;                       // 1 = FONS (deepest)
    const tripNum = nTrips - depth + 1;        // which trip number loads at this depth
    const isActive = depth === activeDepth;
    const isDone   = depth > activeDepth;      // already unloaded (closer to door = delivered first)
    const color = tripColors[(tripNum - 1) % tripColors.length];
    const bg = isActive ? color : isDone ? color + '40' : '#e5e7eb';
    const cls = isActive ? 'active' : isDone ? 'done-s' : 'empty-s';
    return `<div class="tps-seg ${cls}" style="background:${bg}">${isActive ? '▼' : depth}</div>`;
  }).join('');

  // Position label for active section
  const posLabels = {1:'Fons (darrere)',2:'Mig-Fons',3:'Mig',4:'Mig-Davant',5:'Davant (porta)'};
  const posKey = Math.ceil(activeDepth / Math.max(nTrips,1) * 5);
  const posLabel = posLabels[posKey] || 'Mig';

  return `
    <div class="truck-pos">
      <div class="truck-pos-lbl">
        <span>🚛 Posició al camió</span>
        <span style="color:var(--primary)">${posLabel}</span>
      </div>
      <div class="tps-bar">
        <span class="tps-depot">FONS</span>
        ${segs}
        <span class="tps-depot">PORTA</span>
      </div>
    </div>`;
}

function confirmDelivery() {
  prodChecked = new Set();
  currentIdx++;
  if (currentIdx >= sequence.length) {
    renderDone();
    return;
  }
  // If next is a reload step, go directly to reload screen (don't go back to map)
  if (sequence[currentIdx].type === 'reload') {
    renderReloadScreen();
    return;
  }
  showScreen('nav');
  initMap();
  renderNextStopCard();
  renderStopListMini();
}

function renderDone() {
  showScreen('done');
  document.getElementById('done-stats').textContent =
    `${selectedRoute.n_stops} parades · ${selectedRoute.total_km} km · ${selectedRoute.total_fuel_l}L`;
  document.getElementById('done-co2').textContent = selectedRoute.co2_saved_kg + ' kg';
}

function resetApp() {
  selectedRoute = null;
  sequence = [];
  currentIdx = 0;
  document.getElementById('header-sub').textContent = 'Selecciona la teva ruta';
  document.getElementById('btn-start-route').disabled = true;
  showScreen('sel');
  renderVehicleList();
}

function fmtTime(s) {
  if (!s && s !== 0) return '—';
  return `${Math.floor(s/3600)}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}`;
}

// ── Google Maps deep links ────────────────────────────────────────────────────
// Build a Google Maps directions URL for an ordered list of stops.
// Uses ?api=1 format (up to 9 waypoints); falls back to /dir/A/B/C/ for longer routes.
function buildGoogleMapsURL(stops, depot) {
  if (!stops.length) return null;
  const origin = `${depot.lat},${depot.lon}`;
  const coords = stops.map(s => `${s.lat},${s.lon}`);

  if (coords.length === 1) {
    return `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${encodeURIComponent(coords[0])}&travelmode=driving`;
  }

  const destination = coords[coords.length - 1];
  const wps = coords.slice(0, -1);

  if (wps.length <= 9) {
    // Official URL API — supports up to 9 intermediate waypoints
    return `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${encodeURIComponent(destination)}&waypoints=${encodeURIComponent(wps.join('|'))}&travelmode=driving`;
  }

  // Slash format — no documented waypoint limit, opens in Maps app on mobile
  return 'https://www.google.com/maps/dir/' + [origin, ...coords].map(encodeURIComponent).join('/') + '/';
}

// Navigate to one specific stop (from current GPS position)
function openGoogleMapsStop(lat, lon) {
  const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=driving`;
  window.open(url, '_blank');
}

// Navigate to the depot/warehouse
function openGoogleMapsDepot() {
  const depot = selectedRoute.depot;
  const url = `https://www.google.com/maps/dir/?api=1&destination=${depot.lat},${depot.lon}&travelmode=driving`;
  window.open(url, '_blank');
}

// Navigate to next item in sequence (single stop or depot for reload)
function openGoogleMapsNext() {
  const item = sequence[currentIdx];
  if (!item) return;
  if (item.type === 'reload') { openGoogleMapsDepot(); return; }
  openGoogleMapsStop(item.lat, item.lon);
}

// Open full current trip route in Google Maps (all stops from depot)
function openGoogleMapsTrip() {
  const item = sequence[currentIdx];
  if (!item) return;
  const depot = selectedRoute.depot;
  const tripNum = item.type === 'stop' ? item.trip_num : (item.trip_to || 1);

  // All stops in this trip (from current position onward)
  const remaining = sequence
    .slice(currentIdx)
    .filter(s => s.type === 'stop' && s.trip_num === tripNum);

  if (!remaining.length) return;
  const url = buildGoogleMapsURL(remaining, depot);
  if (url) window.open(url, '_blank');
}

init();
</script>
